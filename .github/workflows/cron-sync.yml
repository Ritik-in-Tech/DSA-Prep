name: External cron

on:
  schedule:
    # sync-users every 2h on odd-numbered hours UTC (01, 03, 05, ..., 23)
    # so it never collides with sync-problems on the same minute.
    - cron: "0 1-23/2 * * *"
    # sync-problems every 6h: 00:00, 06:00, 12:00, 18:00 UTC.
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      target:
        description: "Which sync to run"
        required: true
        default: "sync-users"
        type: choice
        options:
          - sync-users
          - sync-problems

concurrency:
  group: cron-${{ github.event.schedule || github.event.inputs.target }}
  cancel-in-progress: false

jobs:
  sync-users:
    if: github.event.schedule == '0 1-23/2 * * *' || github.event.inputs.target == 'sync-users'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      LEETCODE_GRAPHQL_URL: ${{ secrets.LEETCODE_GRAPHQL_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm prisma generate
      - name: Run sync-users
        run: pnpm cron:sync-users

  sync-problems:
    if: github.event.schedule == '0 */6 * * *' || github.event.inputs.target == 'sync-problems'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      LEETCODE_GRAPHQL_URL: ${{ secrets.LEETCODE_GRAPHQL_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm prisma generate
      - name: Run sync-problems
        run: pnpm cron:sync-problems
